[workspace]
members = [
    "bin/*",
    "crates/e2e",
    "crates/network/*",
    "crates/node/*",
    "crates/storage/*",
    "crates/utilities/*",
    "crates/core/*",
    "crates/execution/*",
    "crates/precompile/*",
    "crates/consensus/consensus-engine",
    "crates/consensus/dkg-onchain-artifacts",
    "crates/sdk/provider",
    "crates/telemetry/util",
    "tools/faucet",
    "tools/xtask",
]
exclude = [
    # Exclude duplicate-named crates (same name as crates/node/* counterparts)
    "crates/consensus/engine",
    "crates/consensus/dkg",
]
default-members = ["bin/magnus"]
resolver = "2"

[workspace.package]
version = "0.1.0"
edition = "2024"
rust-version = "1.88"
license = "MIT"
repository = "https://github.com/refcell/magnus"
publish = false

[workspace.lints.rust]
missing-debug-implementations = "warn"
missing-docs = "warn"
unreachable-pub = "warn"
unused-must-use = "deny"
rust-2018-idioms = "deny"
unnameable-types = "warn"

[workspace.lints.rustdoc]
all = "warn"

[workspace.lints.clippy]
all = "warn"
missing-const-for-fn = "warn"
use-self = "warn"
option-if-let-else = "warn"
redundant-clone = "warn"

[profile.dev]
debug = "line-tables-only"
split-debuginfo = "packed"
incremental = false

[profile.release]
opt-level = 3
lto = "thin"
debug = false
strip = "symbols"

[profile.maxperf]
inherits = "release"
lto = "fat"
codegen-units = 1

[workspace.dependencies]
# ========================================
# Magnus Local Crates (node)
# ========================================
magnus-builder = { path = "crates/node/builder" }
magnus-node = { package = "magnus-builder", path = "crates/node/builder", default-features = false }
magnus-domain = { path = "crates/node/domain" }
magnus-cli = { path = "crates/utilities/cli" }
magnus-crypto = { path = "crates/utilities/crypto" }
magnus-backend = { path = "crates/storage/backend" }
magnus-config = { path = "crates/node/config" }
magnus-consensus = { path = "crates/node/consensus" }
magnus-consensus-engine = { path = "crates/consensus/consensus-engine" }
magnus-consensus-engine-config = { path = "crates/node/consensus-engine-config" }
magnus-executor = { path = "crates/node/executor" }
magnus-ledger = { path = "crates/node/ledger" }
magnus-marshal = { path = "crates/network/marshal" }
magnus-mempool = { path = "crates/node/mempool", default-features = false }
magnus-reporters = { path = "crates/node/reporters" }
magnus-service = { path = "crates/node/service" }
magnus-simplex = { path = "crates/node/simplex" }
magnus-transport = { path = "crates/network/transport" }
magnus-transport-sim = { path = "crates/network/transport-sim" }
magnus-sys = { path = "crates/utilities/sys" }
magnus-handlers = { path = "crates/storage/handlers" }
magnus-overlay = { path = "crates/storage/overlay" }
magnus-qmdb = { path = "crates/storage/qmdb" }
magnus-qmdb-ledger = { path = "crates/storage/qmdb-ledger" }
magnus-traits = { path = "crates/storage/traits" }
magnus-indexer = { path = "crates/storage/indexer" }
magnus-dkg = { path = "crates/node/dkg" }
magnus-dkg-onchain-artifacts = { path = "crates/consensus/dkg-onchain-artifacts" }
magnus-runner = { path = "crates/node/runner" }
magnus-rpc = { path = "crates/node/rpc" }
magnus-txpool = { path = "crates/node/txpool" }
magnus-precompiles = { path = "crates/node/precompiles" }
magnus-e2e = { path = "crates/e2e" }
magnus-payload-types = { path = "crates/node/payload-types", default-features = false }

# Core
magnus-primitives = { path = "crates/core/primitives", default-features = false, features = ["reth", "serde", "serde-bincode-compat"] }
magnus-chainspec = { path = "crates/core/chainspec", default-features = false }
magnus-eyre = { path = "crates/core/error", default-features = false }

# Execution
magnus-evm = { path = "crates/execution/evm", default-features = false }
magnus-vm = { path = "crates/execution/vm", default-features = false }

# Precompile
magnus-contracts = { path = "crates/precompile/contracts", default-features = false }
magnus-precompile-macros = { path = "crates/precompile/macros" }
magnus-precompile-registry = { path = "crates/precompile/registry", default-features = false }

# SDK
magnus-provider = { path = "crates/sdk/provider" }

# Telemetry
magnus-telemetry-util = { path = "crates/telemetry/util" }

# Tools
magnus-faucet = { path = "tools/faucet", default-features = false }
magnus-xtask = { path = "tools/xtask" }


# ========================================
# REVM (Rust EVM)
# ========================================
revm = { version = "33.1.0", features = ["optional_fee_charge"] }

# ========================================
# Alloy (Ethereum Core Libraries)
# ========================================
alloy = { version = "1.1.3", default-features = false }
alloy-consensus = { version = "1.1.3", default-features = false }
alloy-contract = { version = "1.1.3", default-features = false }
alloy-eips = { version = "1.1.3", default-features = false }
alloy-evm = "0.25.2"
alloy-genesis = "1.1.3"
alloy-hardforks = "0.4.5"
alloy-network = { version = "1.1.3", default-features = false }
alloy-primitives = { version = "1.5.0", default-features = false }
alloy-provider = { version = "1.1.3", default-features = false }
alloy-rlp = "0.3.12"
alloy-rpc-types-engine = "1.1.3"
alloy-rpc-types-eth = { version = "1.1.3" }
alloy-serde = "1.1.3"
alloy-signer = "1.1.3"
alloy-signer-local = "1.1.3"
alloy-sol-types = "1.5.0"
alloy-transport = "1.1.3"

# ========================================
# Commonware Libraries
# ========================================
# Commonware main right after https://github.com/commonwarexyz/monorepo/pull/2740 was merged
commonware-broadcast = { git = "https://github.com/commonwarexyz/monorepo", rev = "5ca1fb0bba4f2f04bf27d1da2b68ef034dca93be" }
commonware-codec = { git = "https://github.com/commonwarexyz/monorepo", rev = "5ca1fb0bba4f2f04bf27d1da2b68ef034dca93be" }
commonware-consensus = { git = "https://github.com/commonwarexyz/monorepo", rev = "5ca1fb0bba4f2f04bf27d1da2b68ef034dca93be" }
commonware-cryptography = { git = "https://github.com/commonwarexyz/monorepo", rev = "5ca1fb0bba4f2f04bf27d1da2b68ef034dca93be" }
commonware-macros = { git = "https://github.com/commonwarexyz/monorepo", rev = "5ca1fb0bba4f2f04bf27d1da2b68ef034dca93be" }
commonware-math = { git = "https://github.com/commonwarexyz/monorepo", rev = "5ca1fb0bba4f2f04bf27d1da2b68ef034dca93be" }
commonware-p2p = { git = "https://github.com/commonwarexyz/monorepo", rev = "5ca1fb0bba4f2f04bf27d1da2b68ef034dca93be" }
commonware-parallel = { git = "https://github.com/commonwarexyz/monorepo", rev = "5ca1fb0bba4f2f04bf27d1da2b68ef034dca93be" }
commonware-runtime = { git = "https://github.com/commonwarexyz/monorepo", rev = "5ca1fb0bba4f2f04bf27d1da2b68ef034dca93be" }
commonware-storage = { git = "https://github.com/commonwarexyz/monorepo", rev = "5ca1fb0bba4f2f04bf27d1da2b68ef034dca93be" }
commonware-utils = { git = "https://github.com/commonwarexyz/monorepo", rev = "5ca1fb0bba4f2f04bf27d1da2b68ef034dca93be" }

# ========================================
# Async Runtime & Concurrency
# ========================================
tokio = { version = "1.45.1", features = ["full"] }
tokio-util = "0.7.16"
futures = "0.3.31"
async-trait = "0.1"
async-lock = "3.4.1"
rayon = "1.10"

# ========================================
# Serialization
# ========================================
serde = { version = "1.0.219", features = ["derive"] }
serde_json = "1.0.142"

# ========================================
# Error Handling
# ========================================
thiserror = "2.0.14"
eyre = "0.6.12"

# ========================================
# Logging & Tracing
# ========================================
tracing = "0.1.41"
tracing-subscriber = "0.3.19"

# ========================================
# Cryptography
# ========================================
sha2 = "0.10"
rand = "0.8.5"
rand_core = "0.6.4"
secp256k1 = "0.30.0"
p256 = "0.13"

# ========================================
# Networking
# ========================================
axum = "0.8.4"
jsonrpsee = { version = "0.26.0", features = ["server", "client", "macros"] }

# ========================================
# CLI
# ========================================
clap = { version = "4.5.45", features = ["derive"] }
indicatif = "0.18"

# ========================================
# Utilities
# ========================================
bytes = "1.8"
const-hex = { version = "1.15.0" }
derive_more = { version = "2.0.0" }
parking_lot = "0.12.4"
indexmap = "2.11.0"
itertools = "0.14.0"
auto_impl = "1"
arbitrary = { version = "1.3", features = ["derive"] }
proptest = "1.7"
proptest-arbitrary-interop = "0.1.0"
tempfile = "3.20.0"
base64 = "0.22"
jiff = { version = "0.2.15", default-features = false }
schnellru = "0.2"
governor = "0.10.2"
metrics = "0.24.0"
prometheus-client = "0.24.0"
modular-bitfield = "0.11.2"

# ========================================
# Build Dependencies
# ========================================
vergen = "9"
vergen-git2 = "1"

# ========================================
# Testing
# ========================================
criterion = "0.7.0"
test-case = "3"

# ========================================
# Profiling
# ========================================
pyroscope = "0.5.8"
pyroscope_pprofrs = "0.2.10"

[profile.release]
lto = "fat"
codegen-units = 1
strip = true

[profile.dev]
opt-level = 1

[profile.dev.package."*"]
opt-level = 3

[profile.bench]
inherits = "release"
debug = true

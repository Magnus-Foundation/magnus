[workspace]
resolver = "2"
members = [
    # Apps
    "apps/node",
    "apps/sidecar",
    "apps/bench",

    # Core
    "crates/core/primitives",
    "crates/core/chainspec",
    "crates/core/error",

    # Consensus
    "crates/consensus/engine",
    "crates/consensus/consensus-engine",
    "crates/consensus/dkg",
    "crates/consensus/dkg-onchain-artifacts",

    # Execution
    "crates/execution/evm",
    "crates/execution/vm",

    # Payload
    "crates/node/payload-types",

    # Precompile
    "crates/precompile/registry",
    "crates/precompile/macros",
    "crates/precompile/contracts",

    # Node
    "crates/node/builder",
    "crates/node/config",
    "crates/node/consensus-engine-config",
    "crates/node/payload",
    "crates/node/mempool",

    # SDK
    "crates/sdk/provider",

    # Telemetry
    "crates/telemetry/util",

    # Tools
    "tools/xtask",
    "tools/faucet",

    # E2E Tests
    "e2e",
]

[workspace.package]
version = "0.1.0"
edition = "2024"
rust-version = "1.91"
license = "MIT OR Apache-2.0"
repository = "https://github.com/magnus-chain/magnus"
homepage = "https://magnus.network"
keywords = ["blockchain", "evm", "stablecoin", "payments", "vietnam"]
categories = ["cryptography::cryptocurrencies"]
publish = false

[workspace.lints.rust]
missing_debug_implementations = "warn"
unreachable_pub = "warn"
unused_must_use = "deny"

[workspace.lints.clippy]
all = "warn"

[workspace.lints.rustdoc]
all = "warn"

[workspace.dependencies]
# ========================================
# Magnus Internal Crates
# ========================================

# Core
magnus-primitives = { path = "crates/core/primitives", default-features = false, features = ["reth"] }
magnus-chainspec = { path = "crates/core/chainspec", default-features = false }
magnus-eyre = { path = "crates/core/error", default-features = false }

# Consensus
magnus-consensus = { path = "crates/consensus/engine", default-features = false }
magnus-consensus-engine = { path = "crates/consensus/consensus-engine" }
magnus-dkg = { path = "crates/consensus/dkg" }
magnus-dkg-onchain-artifacts = { path = "crates/consensus/dkg-onchain-artifacts" }

# Execution
magnus-evm = { path = "crates/execution/evm", default-features = false }
magnus-vm = { path = "crates/execution/vm", default-features = false }

# Payload
magnus-payload = { path = "crates/node/payload", default-features = false }
magnus-payload-types = { path = "crates/node/payload-types", default-features = false }

# Mempool (Transaction Pool)
magnus-mempool = { path = "crates/node/mempool", default-features = false }

# Precompile
magnus-precompile-registry = { path = "crates/precompile/registry", default-features = false }
magnus-precompile-macros = { path = "crates/precompile/macros" }
magnus-contracts = { path = "crates/precompile/contracts", default-features = false }

# Node
magnus-node = { path = "crates/node/builder", default-features = false }
magnus-config = { path = "crates/node/config", default-features = false }
magnus-consensus-engine-config = { path = "crates/node/consensus-engine-config" }

# SDK
magnus-provider = { path = "crates/sdk/provider" }

# Telemetry
magnus-telemetry-util = { path = "crates/telemetry/util" }

# Tools
magnus-faucet = { path = "tools/faucet", default-features = false }
magnus-xtask = { path = "tools/xtask" }

# E2E
magnus-e2e = { path = "e2e" }


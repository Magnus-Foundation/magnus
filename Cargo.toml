# ========================================
# Execution
# ========================================
revm = { version = "34.0.0", default-features = false }
alloy-evm = { version = "0.27.0", default-features = false }

# ========================================
# Alloy (Ethereum Core Libraries)
# ========================================
alloy = { version = "1.1.3", default-features = false }
alloy-consensus = { version = "1.0", features = ["k256"] }
alloy-contract = { version = "1.1.3", default-features = false }
alloy-eips = "1.0"
alloy-genesis = "1.1.3"
alloy-hardforks = "0.4.5"
alloy-network = { version = "1.1.3", default-features = false }
alloy-primitives = "1.0"
alloy-provider = { version = "1.1.3", default-features = false }
alloy-rlp = "0.3"
alloy-rpc-types-engine = "1.1.3"
alloy-rpc-types-eth = { version = "1.1.3" }
alloy-serde = "1.1.3"
alloy-signer = "1.1.3"
alloy-signer-local = "1.1.3"
alloy-sol-types = "1.0"
alloy-transport = "1.1.3"

# ========================================
# Async Runtime & Concurrency
# ========================================
tokio = { version = "1", features = ["full"] }
tokio-util = "0.7.16"
futures = "0.3"
async-trait = "0.1"
rayon = "1.10"

# ========================================
# Serialization
# ========================================
serde = { version = "1", features = ["derive"] }
serde_json = "1"
toml = "0.8"

# ========================================
# CLI
# ========================================
clap = { version = "4", features = ["derive"] }
indicatif = "0.18"

# ========================================
# Tracing
# ========================================
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# ========================================
# Error handling
# ========================================
thiserror = "2"
eyre = "0.6"

# ========================================
# Networking
# ========================================
axum = "0.8.4"
jsonrpsee = { version = "0.26.0", features = ["server", "client", "macros"] }

# ========================================
# Concurrency
# ========================================
parking_lot = "0.12"

# ========================================
# Utilities
# ========================================
anyhow = "1.0.100"
arbitrary = { version = "1.3", features = ["derive"] }
auto_impl = "1"
base64 = "0.22"
bytes = "1"
const-hex = { version = "1.15.0" }
derive_more = { version = "2.0.0" }
governor = "0.10.4"
hex = "0.4"
hex-literal = "0.4"
indexmap = "2.11.0"
itertools = "0.14.0"
jiff = { version = "0.2.15", default-features = false }
k256 = "0.13"
libc = "0.2"
metrics = "0.24.0"
modular-bitfield = "0.13.1"
p256 = "0.13"
prometheus-client = "0.24.0"
rand = "0.8"
rand_core = "0.6"
schnellru = "0.2"
secp256k1 = "0.30.0"
sha2 = "0.10"
sha3 = "0.10"

# ========================================
# HTTP
# ========================================
reqwest = { version = "0.12", features = ["json"] }

# ========================================
# Build Dependencies
# ========================================
vergen = { version = "9", features = ["build", "cargo", "emit_and_set"] }
vergen-git2 = { version = "9", features = ["build", "cargo"] }

# ========================================
# Testing
# ========================================
criterion = "0.7.0"
proptest = "1.7"
proptest-arbitrary-interop = "0.1.0"
rstest = "0.24"
tempfile = "3"
test-case = "3"

# ========================================
# Profiling
# ========================================
pyroscope = "0.5.8"
pyroscope_pprofrs = "0.2.10"

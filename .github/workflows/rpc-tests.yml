name: RPC Tests

permissions: {}

on:
  push:
    branches: [main]
    paths:
      - 'crates/node/**'
      - 'crates/primitives/**'
      - 'crates/revm/**'
  pull_request:
    paths:
      - 'crates/node/**'
      - 'crates/primitives/**'
      - 'crates/revm/**'
  merge_group:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: full
  RUSTC_WRAPPER: "sccache"
  MAGNUS_TESTNET_RPC_URL: ${{ secrets.MAGNUS_TESTNET_RPC_URL || 'https://rpc.moderato.magnus.xyz' }}
  MAGNUS_DEVNET_RPC_URL: ${{ secrets.MAGNUS_DEVNET_RPC_URL || 'https://rpc.devnet.magnusxyz.dev' }}

jobs:
  rpc-tests:
    name: rpc-tests (${{ matrix.network }})
    runs-on: depot-ubuntu-latest-4
    timeout-minutes: 30
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - network: testnet
            allow_failure: false
          - network: devnet
            allow_failure: true
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
      - uses: rui314/setup-mold@725a8794d15fc7563f59595bd9556495c0564878 # v1
      - uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10
      - uses: taiki-e/install-action@cf525cb33f51aca27cd6fa02034117ab963ff9f1 # v2.75.22
        with:
          tool: nextest@0.9.124
      - name: Build RPC tests
        id: build
        continue-on-error: ${{ matrix.allow_failure }}
        run: cargo nextest run --profile ci-rpc -E 'package(magnus-node) & binary(it) & test(/test_matrices_${{ matrix.network }}/)' --no-run
      - name: Run RPC tests
        id: run
        if: steps.build.outcome == 'success'
        continue-on-error: ${{ matrix.allow_failure }}
        run: cargo nextest run --profile ci-rpc -E 'package(magnus-node) & binary(it) & test(/test_matrices_${{ matrix.network }}/)'
      - name: Report allowed devnet failure
        if: matrix.allow_failure && (steps.build.outcome == 'failure' || steps.run.outcome == 'failure')
        run: echo '::warning::Devnet RPC tests failed, but this check is allowed to fail so merge queue processing can continue.'
